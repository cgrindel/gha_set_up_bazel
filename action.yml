name: Set Up Bazel
description: >-
  Configure Bazel with caching via bazel-contrib/setup-bazel. Removes the startup --output_base override from ~/.bazelrc to prevent output-base lock contention in integration tests, and enables --config=ci.
inputs:
  bazelisk_cache:
    description: Cache Bazelisk downloads based on .bazelversion.
    default: "true"
  repository_cache:
    description: Cache repositories based on MODULE.bazel/WORKSPACE.
    default: "true"
  disk_cache:
    description: >-
      Cache action outputs based on BUILD files. Set to false if using a remote cache (e.g., BuildBuddy). Can pass a string for workflow-specific keys.
    default: "false"
  enable_ci_config:
    description: Whether to append 'common --config=ci' to ~/.bazelrc.
    default: "true"
runs:
  using: composite
  steps:
    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: ${{ inputs.bazelisk_cache }}
        repository-cache: ${{ inputs.repository_cache }}
        disk-cache: ${{ inputs.disk_cache }}
    # setup-bazel writes `startup --output_base=$HOME/.bazel` to ~/.bazelrc
    # so that external repo paths are predictable for caching. Because
    # ~/.bazelrc is read by ALL Bazel invocations, integration tests that
    # spawn their own Bazel server end up sharing the same output base as
    # the outer Bazel, causing the inner server to block on the output-base
    # lock and time out.
    - name: Remove output_base override from ~/.bazelrc
      shell: bash
      run: |
        if grep -q '^startup --output_base=' ~/.bazelrc; then
          sed -i.bak '/^startup --output_base=/d' ~/.bazelrc
          rm -f ~/.bazelrc.bak
        else
          echo "WARNING: startup --output_base not found in ~/.bazelrc"
        fi
    - name: Enable ci config
      if: ${{ inputs.enable_ci_config == 'true' }}
      shell: bash
      run: |
        echo "common --config=ci" >> ~/.bazelrc
